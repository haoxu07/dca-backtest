<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Backtest</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9;
    min-height: 100vh; display: flex; justify-content: center; padding-top: 40px;
  }
  .container { width: 100%; max-width: 960px; padding: 0 20px; }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 24px; color: #f0f6fc; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 8px 12px; font-size: 0.9rem; width: 160px; }
  .field input:focus { outline: none; border-color: #58a6ff; }
  button {
    background: #238636; border: 1px solid #2ea043; color: white; border-radius: 6px;
    padding: 8px 20px; font-size: 0.9rem; font-weight: 500; cursor: pointer;
    white-space: nowrap; height: 38px;
  }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .chart-wrap { position: relative; height: 420px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 14px 16px; }
  .stat .label { font-size: 0.72rem; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
  .stat .value { font-size: 1.25rem; font-weight: 600; }
  .stat .value.up { color: #3fb950; }
  .stat .value.down { color: #f85149; }
  .error { background: #490202; border: 1px solid #f85149; border-radius: 6px; padding: 12px 16px; color: #f85149; font-size: 0.85rem; margin-bottom: 16px; display: none; }
  .note { font-size: 0.78rem; color: #484f58; margin-top: 8px; }
  .examples { font-size: 0.78rem; color: #484f58; margin-top: 6px; }
  .examples a { color: #58a6ff; cursor: pointer; text-decoration: none; }
  .examples a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>DCA Backtest</h1>

  <div class="card">
    <div class="form-row">
      <div class="field">
        <label>Stock Symbol</label>
        <input type="text" id="symbol" value="AAPL" placeholder="e.g. AAPL, TSLA, SPY">
      </div>
      <div class="field">
        <label>Start Date</label>
        <input type="date" id="startDate" value="2020-01-01">
      </div>
      <div class="field">
        <label>End Date</label>
        <input type="date" id="endDate" value="2026-01-01">
      </div>
      <div class="field">
        <label>Daily Amount ($)</label>
        <input type="number" id="amount" value="20" min="1" step="1">
      </div>
      <button id="runBtn" onclick="run()">Run Backtest</button>
    </div>
    <div class="examples">
      Try:
      <a onclick="fill('AAPL','2020-01-01','2026-01-01',20)">AAPL</a> ·
      <a onclick="fill('SPY','2015-01-01','2026-01-01',50)">SPY</a> ·
      <a onclick="fill('NVDA','2023-01-01','2026-01-01',30)">NVDA</a> ·
      <a onclick="fill('TSLA','2022-01-01','2026-01-01',25)">TSLA</a>
    </div>
    <div class="note" id="swStatus">Service Worker: initializing...</div>
  </div>

  <div class="error" id="error"></div>

  <div class="stats" id="stats" style="display:none;">
    <div class="stat"><div class="label">Total Invested</div><div class="value" id="sInvested">-</div></div>
    <div class="stat"><div class="label">Final Value</div><div class="value" id="sFinal">-</div></div>
    <div class="stat"><div class="label">Total Return</div><div class="value" id="sReturn">-</div></div>
    <div class="stat"><div class="label">Total ROI %</div><div class="value" id="sROI">-</div></div>
    <div class="stat"><div class="label">Sharpe Ratio</div><div class="value" id="sSharpe">-</div></div>
    <div class="stat"><div class="label">Max Drawdown</div><div class="value" id="sDD">-</div></div>
  </div>

  <div class="card" id="chartCard" style="display:none;">
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
</div>

<script>
// ── Service Worker proxy ─────────────────────────────────────────
// The SW intercepts ./yahoo/*, fetches from query2.finance.yahoo.com,
// and adds CORS headers — in-browser, zero backend.
let swReady = false;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Wait for the SW to claim this page
    const poll = () => {
      if (navigator.serviceWorker.controller) {
        swReady = true;
        document.getElementById('swStatus').textContent = 'Ready';
        return;
      }
      // If there's an installing/activating worker, wait for it
      const sw = reg.installing || reg.waiting;
      if (sw) {
        sw.onstatechange = () => { if (sw.state === 'activated') poll(); };
        if (sw.state === 'activated') poll();
      }
    };
    poll();
    // Fallback: check again after a brief delay for claim() to take effect
    setTimeout(poll, 1000);
    setTimeout(poll, 3000);
  }).catch(e => {
    document.getElementById('swStatus').textContent =
      'SW error: ' + e.message + '. Try refreshing the page.';
  });
} else {
  document.getElementById('swStatus').textContent = 'Browser does not support Service Workers.';
}
</script>

<script>
let chart = null;

function fill(sym, s, e, amt) {
  document.getElementById('symbol').value = sym;
  document.getElementById('startDate').value = s;
  document.getElementById('endDate').value = e;
  document.getElementById('amount').value = amt;
}

async function run() {
  const btn = document.getElementById('runBtn');
  const err = document.getElementById('error');
  btn.disabled = true;
  err.style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('chartCard').style.display = 'none';

  const symbol = document.getElementById('symbol').value.trim().toUpperCase();
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  const dailyAmt = parseFloat(document.getElementById('amount').value);

  if (!symbol || !start || !end || !dailyAmt || dailyAmt <= 0) {
    showErr('Please fill all fields.');
    btn.disabled = false;
    return;
  }
  if (new Date(start) >= new Date(end)) {
    showErr('Start date must be before end date.');
    btn.disabled = false;
    return;
  }

  const p1 = Math.floor(new Date(start).getTime() / 1000);
  const p2 = Math.floor(new Date(end).getTime() / 1000);
  const params = `period1=${p1}&period2=${p2}&interval=1d&includePrePost=false&events=div%7Csplit`;

  let data;
  let lastErr;

  // Fetch via Service Worker proxy (sw.js intercepts api/yahoo/*)
  if (!swReady) {
    showErr('Service Worker not ready yet. Please refresh the page and try again.');
    btn.disabled = false;
    return;
  }
  try {
    const res = await fetch(`api/yahoo/v8/finance/chart/${symbol}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    showErr(`Failed to fetch "${symbol}". Check the symbol or try refreshing the page. (${e.message})`);
    btn.disabled = false;
    return;
  }

  const result = data.chart?.result?.[0];
  if (!result) {
    showErr(`No data found for "${symbol}". Check the symbol and date range.`);
    btn.disabled = false;
    return;
  }

  const timestamps = result.timestamp;
  const quote = result.indicators.quote[0];
  const adjclose = result.indicators.adjclose?.[0]?.adjclose;
  const prices = adjclose || quote.close;

  // Build DCA series
  const series = [];
  let shares = 0, totalCost = 0;

  for (let i = 0; i < timestamps.length; i++) {
    const px = prices[i];
    if (px == null) continue;
    shares += dailyAmt / px;
    totalCost += dailyAmt;
    series.push({
      date: new Date(timestamps[i] * 1000),
      value: shares * px,
      cost: totalCost,
    });
  }

  if (series.length < 2) {
    showErr('Not enough data points. Try a wider date range.');
    btn.disabled = false;
    return;
  }

  // Stats
  const final = series[series.length - 1];
  const roi = ((final.value / final.cost) - 1) * 100;

  // Sharpe
  const dr = [];
  for (let i = 1; i < series.length; i++) dr.push((series[i].value / series[i - 1].value) - 1);
  const avgR = dr.reduce((a, b) => a + b, 0) / dr.length;
  const stdR = Math.sqrt(dr.reduce((s, r) => s + (r - avgR) ** 2, 0) / dr.length);
  const sharpe = stdR > 0 ? (avgR / stdR) * Math.sqrt(252) : 0;

  // Max drawdown
  let peak = 0, maxDD = 0;
  for (const s of series) {
    if (s.value > peak) peak = s.value;
    const dd = (s.value - peak) / peak;
    if (dd < maxDD) maxDD = dd;
  }

  document.getElementById('sInvested').textContent = '$' + final.cost.toLocaleString('en-US', {maximumFractionDigits: 0});
  document.getElementById('sFinal').textContent = '$' + final.value.toLocaleString('en-US', {maximumFractionDigits: 0});
  document.getElementById('sReturn').textContent = '$' + (final.value - final.cost).toLocaleString('en-US', {maximumFractionDigits: 0, signDisplay: 'always'});
  document.getElementById('sReturn').className = 'value ' + (final.value >= final.cost ? 'up' : 'down');
  document.getElementById('sROI').textContent = roi.toFixed(1) + '%';
  document.getElementById('sROI').className = 'value ' + (roi >= 0 ? 'up' : 'down');
  document.getElementById('sSharpe').textContent = sharpe.toFixed(2);
  document.getElementById('sDD').textContent = (maxDD * 100).toFixed(1) + '%';
  document.getElementById('sDD').className = 'value down';

  document.getElementById('stats').style.display = 'grid';
  document.getElementById('chartCard').style.display = 'block';

  // Chart
  if (chart) chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  const labels = series.map(s => s.date.toISOString().slice(0, 10));
  const step = Math.max(1, Math.floor(labels.length / 12));
  const dl = labels.map((l, i) => i % step === 0 ? l : '');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dl,
      datasets: [
        {
          label: 'Portfolio Value',
          data: series.map(s => s.value),
          borderColor: '#3fb950',
          backgroundColor: 'rgba(63,185,80,0.1)',
          fill: true, tension: 0.1, pointRadius: 0, borderWidth: 2,
        },
        {
          label: 'Total Invested',
          data: series.map(s => s.cost),
          borderColor: '#8b949e',
          borderDash: [6, 4], tension: 0, pointRadius: 0, borderWidth: 1.5,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color: '#8b949e', usePointStyle: true, padding: 20 } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString('en-US', {maximumFractionDigits: 0})}` } }
      },
      scales: {
        x: { ticks: { color: '#484f58', maxTicksLimit: 14, maxRotation: 0 }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#484f58', callback: v => '$' + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v.toFixed(0)) }, grid: { color: '#21262d' } },
      },
    },
  });

  btn.disabled = false;
}

function showErr(msg) {
  const e = document.getElementById('error');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
